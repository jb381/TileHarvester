name: CI

on:
  push:
    branches: [master, fix/review-issues, fix/critical-bugs]
  pull_request:
    branches: [master]

jobs:
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3

  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run ruff check
        run: uv run ruff check --output-format=github
      - name: Run ruff format check
        run: uv run ruff format --check

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests (excluding e2e)
        run: uv run pytest -m "not e2e" --ignore=tests/e2e --ignore=test_e2e.py -v
