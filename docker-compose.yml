services:
  tileharvester:
    build: .
    image: tileharvester:latest
    container_name: tileharvester
    volumes:
      - tileharvester-data:/data
      - ./.env:/app/.env:ro
    environment:
      - TH_DATA_DIR=/data
      # Set these before running:
      - TH_STRAVA_CLIENT_ID=${TH_STRAVA_CLIENT_ID}
      - TH_STRAVA_CLIENT_SECRET=${TH_STRAVA_CLIENT_SECRET}
      - TH_STRAVA_REDIRECT_URI=${TH_STRAVA_REDIRECT_URI:-http://localhost:8000/callback}
      - TH_POLL_INTERVAL_MINUTES=${TH_POLL_INTERVAL_MINUTES:-5}
      - TH_SQUADRAT_OFFSET=${TH_SQUADRAT_OFFSET:-0}
    # For auth command, you need interactive mode:
    # docker compose run --rm tileharvester auth
    # For one-shot sync:
    # docker compose run --rm tileharvester sync --once
    # For continuous sync (override default):
    # docker compose run --rm tileharvester sync
    command: ["--help"]

  # Background sync — runs tileharvester sync in a loop
  tileharvester-cron:
    build: .
    image: tileharvester:latest
    container_name: tileharvester-cron
    volumes:
      - tileharvester-data:/data
      - ./.env:/app/.env:ro
    environment:
      - TH_DATA_DIR=/data
      - TH_STRAVA_CLIENT_ID=${TH_STRAVA_CLIENT_ID}
      - TH_STRAVA_CLIENT_SECRET=${TH_STRAVA_CLIENT_SECRET}
      - TH_POLL_INTERVAL_MINUTES=${TH_POLL_INTERVAL_MINUTES:-5}
      - TH_SQUADRAT_OFFSET=${TH_SQUADRAT_OFFSET:-0}
    command: ["sync"]
    restart: unless-stopped
    profiles:
      - cron
    labels:
      homepage.group: Infrastructure
      homepage.name: TileHarvester
      homepage.icon: si-strava-#fc4c02
      homepage.href: ${HOMEPAGE_HREF_TILEHARVESTER:-http://localhost:8042/api/tileharvester}
      homepage.description: Strava activity sync (cron)
      homepage.weight: "500"
      homepage.showStats: "true"

volumes:
  tileharvester-data:
    driver: local
